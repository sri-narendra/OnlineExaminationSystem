<!DOCTYPE html>
<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Exam In Progress - Online Exam System</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="js/theme.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_detection/face_detection.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="http://localhost:5000/socket.io/socket.io.js"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#135bec",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Lexend", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        @layer base {
            body {
                font-family: 'Lexend', sans-serif;
            }
        }
        .custom-radio:checked + label {
            border-color: #135bec;
            background-color: rgba(19, 91, 236, 0.05);
        }
        .custom-radio:checked + label .radio-circle {
            border-color: #135bec;
            background-color: #135bec;
            box-shadow: inset 0 0 0 3px white;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col" oncontextmenu="return false;">
<video id="video" autoplay muted style="position: fixed; bottom: 20px; right: 20px; width: 200px; height: 150px; border: 2px solid #ccc; border-radius: 8px; z-index: 1000; display: block;"></video>

<div class="fixed top-0 left-0 w-full h-1.5 bg-slate-200 dark:bg-slate-800 z-50">
<div id="progress-bar" class="h-full bg-primary" style="width: 100%; transition: width 1s linear;"></div>
</div>

<header class="sticky top-0 z-40 w-full border-b border-slate-200 dark:border-slate-800 bg-white/80 dark:bg-background-dark/80 backdrop-blur-md px-6 py-4">
<div class="max-w-7xl mx-auto flex items-center justify-between">
<div class="flex items-center gap-3">
<div class="p-2 bg-primary/10 rounded-lg text-primary">
<span class="material-symbols-outlined block">auto_stories</span>
</div>
<div>
<h1 class="text-sm font-bold tracking-tight text-slate-900 dark:text-slate-100 uppercase">Exam Portal</h1>
<p class="text-[10px] uppercase tracking-widest text-slate-500">Academic System</p>
</div>
</div>
<div class="hidden md:flex flex-col items-center">
<h2 class="text-lg font-bold text-slate-900 dark:text-slate-100" id="exam-title">Exam Title</h2>
<p class="text-xs text-slate-500 font-medium uppercase tracking-wide">Continuous Assessment</p>
</div>
<div class="flex items-center gap-6">
<button class="p-2 text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full transition-colors flex items-center justify-center" onclick="toggleTheme()" id="theme-toggle">
    <span class="material-symbols-outlined" id="theme-toggle-icon">dark_mode</span>
</button>
<div class="flex items-center gap-2 px-4 py-2 bg-primary/5 rounded-full border border-primary/20">
<span class="material-symbols-outlined text-primary text-xl">timer</span>
<span class="text-lg font-mono font-bold text-primary" id="timer-display">00:00</span>
</div>
<div class="hidden sm:block h-8 w-[1px] bg-slate-200 dark:bg-slate-800"></div>
<div class="flex items-center gap-3">
<div class="text-right hidden sm:block">
<p class="text-xs font-bold text-slate-900 dark:text-slate-100" id="user-display-name">Student</p>
<p class="text-[10px] text-slate-500" id="user-id-display">ID: Active</p>
</div>
<div class="size-10 rounded-full bg-slate-200 dark:bg-slate-800 overflow-hidden border-2 border-white dark:border-slate-700 shadow-sm">
<img alt="Student Profile Avatar" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAn29RUczw2LJmjLuePrKgkNevfR9KceDjKBZ1VlbY6lfXAkgOzQS1X4XMZcbGosft8dGjp_GKc9r3qLQCQfH9d8ohQeGLw3A-fS305ww0Pw5Yhem78YoUUDGCx8_1DZ7ptX1dakiczTrld1yz_pC8qYvvKZioSGCDtdW4J6XknC6JtYON2v-u0DDdTWo1VDI-SICNoDmu6OfHgNv789rSxagzvbcEWLHaOzFaqDaG1pZWMIZO5Xt9bRnX7UX7F9d-kQeuHnPx4YGNu"/>
</div>
</div>
</div>
</div>
</header>

<main class="flex-1 flex flex-col items-center py-12 px-4 overflow-y-auto">
<form id="exam-form" class="max-w-3xl w-full space-y-12">
<div id="questions-list" class="space-y-12">
<!-- Questions injected here -->
</div>

<div class="pt-10 border-t border-slate-200 dark:border-slate-800 text-center">
<button class="bg-slate-900 dark:bg-emerald-600 text-white px-12 py-4 rounded-xl font-bold text-lg shadow-xl hover:opacity-90 transition-all flex items-center justify-center gap-2 mx-auto group" type="submit">
<span class="material-symbols-outlined group-hover:scale-110 transition-transform">task_alt</span>
                Submit Examination
            </button>
<p class="mt-4 text-xs text-slate-500">Double check all your answers before submitting. This action cannot be undone.</p>
</div>
</form>
</main>

<footer class="w-full bg-white dark:bg-slate-900 border-t border-slate-200 dark:border-slate-800 px-6 py-4 mt-auto">
<div class="max-w-7xl mx-auto flex items-center justify-between text-xs text-slate-500 uppercase tracking-widest font-bold">
<div class="flex items-center gap-2">
    <span id="socket-status-dot" class="size-2 bg-slate-300 rounded-full"></span>
    <span id="socket-status-text">Proctoring Offline</span>
</div>
<div id="exam-metadata-footer">
            Final Examination Phase
        </div>
</div>
</footer>

<script src="config.js"></script>
<script src="js/auth.js"></script>
<script src="js/exam.js"></script>
<script src="js/proctoring.js"></script>
<script>
    // Update user display name from localStorage if available
    const userData = JSON.parse(localStorage.getItem('user'));
    if (userData && userData.name) {
        document.getElementById('user-display-name').textContent = userData.name;
    }
</script>
</body></html>
