<!DOCTYPE html>
<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Score Card - Online Exam System</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="js/theme.js"></script>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "primary": "#135bec",
                "background-light": "#f6f6f8",
                "background-dark": "#101622",
              },
              fontFamily: {
                "display": ["Lexend", "sans-serif"]
              },
              borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
            },
          },
        }
    </script>
<style type="text/tailwindcss">
        body {
            font-family: 'Lexend', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .circular-progress {
            background: conic-gradient(var(--progress-color) var(--percentage), #e2e8f0 0deg);
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen font-display">
<div class="flex min-h-screen">
<!-- Sidebar -->
<aside class="w-72 bg-white dark:bg-slate-900 border-r border-slate-200 dark:border-slate-800 flex flex-col sticky top-0 h-screen z-50">
<div class="p-6 flex items-center gap-3">
<div class="bg-primary p-2 rounded-lg text-white flex items-center justify-center">
<span class="material-symbols-outlined text-2xl">school</span>
</div>
<h1 class="text-xl font-bold tracking-tight text-slate-900 dark:text-white">ExamFlow</h1>
</div>
<nav class="flex-1 px-4 space-y-1 mt-4">
<a class="flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800 transition-all font-semibold" href="student.html">
<span class="material-symbols-outlined">dashboard</span> Dashboard
                </a>
<a class="flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-semibold bg-primary/10 text-primary border-r-4 border-primary transition-all" href="results.html">
<span class="material-symbols-outlined">analytics</span> View Results
                </a>
<a class="flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800 transition-all font-semibold" href="#" onclick="showAlert('Profile settings coming soon', 'info')">
<span class="material-symbols-outlined">settings</span> Profile Settings
                </a>
</nav>
<div class="p-4 border-t border-slate-200 dark:border-slate-800">
<button class="flex items-center gap-3 w-full px-4 py-3 rounded-lg text-sm font-medium text-red-500 hover:bg-red-50 dark:hover:bg-red-900/10 transition-all font-semibold" onclick="logout()">
<span class="material-symbols-outlined">logout</span> Sign Out
                </button>
</div>
</aside>
<!-- Main Content -->
<main class="flex-1 p-8 lg:p-12 overflow-y-auto" id="score-card-container">
<p class="text-center py-20 text-slate-500">Loading your detailed score card...</p>
</main>
</div>

<script src="config.js"></script>
<script src="js/auth.js"></script>
<script>
    checkAuth('student');
    const urlParams = new URLSearchParams(window.location.search);
    const resultId = urlParams.get('id');

    async function loadScoreCard() {
        const container = document.getElementById('score-card-container');
        if (!resultId) {
            container.innerHTML = '<div class="text-center py-20 text-red-500 font-bold">Invalid Result ID</div>';
            return;
        }

        const response = await apiCall(`/student/result/${resultId}`);

        if (response.success) {
            const data = response.data;
            const total = data.questions.length;
            const score = data.score;
            const percentage = ((score / total) * 100).toFixed(1);
            const isPassed = percentage >= 40;
            const progressColor = isPassed ? '#10b981' : '#ef4444';
            const progressDegrees = (percentage / 100) * 360;

            container.innerHTML = `
                <div class="max-w-4xl mx-auto space-y-10">
                    <header class="flex justify-between items-start">
                        <div>
                            <h2 class="text-3xl font-bold text-slate-900 dark:text-white">${data.test_title}</h2>
                            <p class="text-slate-500 mt-1 uppercase tracking-widest text-[10px] font-bold">Exam Result Analysis</p>
                        </div>
                        <div class="flex items-start gap-4">
<button class="p-2 text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full transition-colors flex items-center justify-center shrink-0" onclick="toggleTheme()" id="theme-toggle">
    <span class="material-symbols-outlined" id="theme-toggle-icon">dark_mode</span>
</button>
<button onclick="window.print()" class="flex items-center gap-2 px-4 py-2 rounded-lg border border-slate-200 dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-800 transition-all text-sm font-bold shrink-0">
    <span class="material-symbols-outlined text-lg">print</span> Print Results
</button>
</div>
                    </header>

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                        <div class="bg-white dark:bg-slate-900 p-8 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-sm flex flex-col items-center justify-center text-center">
                            <div class="size-32 rounded-full circular-progress flex items-center justify-center relative mb-4" style="--percentage: ${progressDegrees}deg; --progress-color: ${progressColor}">
                                <div class="size-28 rounded-full bg-white dark:bg-slate-900 flex flex-col items-center justify-center">
                                    <span class="text-3xl font-bold" style="color: ${progressColor}">${percentage}%</span>
                                    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Score</span>
                                </div>
                            </div>
                            <span class="px-4 py-1 rounded-full text-xs font-bold uppercase tracking-widest" style="background: ${progressColor}20; color: ${progressColor}">
                                ${isPassed ? 'Passed' : 'Failed'}
                            </span>
                        </div>

                        <div class="md:col-span-2 bg-white dark:bg-slate-900 p-8 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-sm">
                            <h3 class="text-lg font-bold mb-6">Subject Performance</h3>
                            <div class="space-y-6">
                                <div>
                                    <div class="flex justify-between items-center mb-2">
                                        <span class="text-sm font-bold text-slate-600 dark:text-slate-400">Total Marks Obtained</span>
                                        <span class="text-sm font-bold text-slate-900 dark:text-white">${score} / ${total}</span>
                                    </div>
                                    <div class="h-2 bg-slate-100 dark:bg-slate-800 rounded-full overflow-hidden">
                                        <div class="h-full rounded-full transition-all duration-1000" style="width: ${percentage}%; background: ${progressColor}"></div>
                                    </div>
                                </div>
                                <div class="grid grid-cols-2 gap-4">
                                    <div class="p-4 bg-slate-50 dark:bg-slate-800/50 rounded-xl">
                                        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Time Spent</p>
                                        <p class="text-lg font-bold text-slate-900 dark:text-white">${
                                             data.started_at && data.submitted_at
                                                 ? (() => {
                                                     const secs = Math.round((new Date(data.submitted_at) - new Date(data.started_at)) / 1000);
                                                     const m = Math.floor(secs / 60), s = secs % 60;
                                                     return `${m}m ${s}s`;
                                                 })()
                                                 : 'N/A'
                                         }</p>
                                    </div>
                                    <div class="p-4 bg-slate-50 dark:bg-slate-800/50 rounded-xl">
                                        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Total Questions</p>
                                        <p class="text-lg font-bold text-slate-900 dark:text-white">${total}</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="space-y-6">
                        <h3 class="text-xl font-bold">Question Review</h3>
                        <div class="grid grid-cols-1 gap-4">
                            ${data.questions.map((q, i) => {
                                const correct = q.is_correct;
                                const statusColor = correct ? 'emerald' : 'red';
                                return `
                                    <div class="bg-white dark:bg-slate-900 p-6 rounded-xl border-l-4 border-${statusColor}-500 shadow-sm">
                                        <div class="flex justify-between items-start gap-4 mb-4">
                                            <p class="font-bold text-slate-900 dark:text-white">Q${i+1}. ${q.question_text}</p>
                                            <span class="material-symbols-outlined text-${statusColor}-500">
                                                ${correct ? 'check_circle' : 'cancel'}
                                            </span>
                                        </div>
                                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                            <div class="text-xs">
                                                <p class="text-slate-400 font-bold uppercase tracking-widest mb-1">Your Choice</p>
                                                <p class="font-bold ${correct ? 'text-emerald-500' : 'text-red-500'}">${q.your_answer ? q[q.your_answer] : 'Not Answered'}</p>
                                            </div>
                                            ${!correct ? `
                                                <div class="text-xs">
                                                    <p class="text-slate-400 font-bold uppercase tracking-widest mb-1">Correct Answer</p>
                                                    <p class="font-bold text-emerald-500">${q[q.correct_option]}</p>
                                                </div>
                                            ` : ''}
                                        </div>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                    </div>

                    <footer class="pt-10 flex justify-center">
                        <a href="student.html" class="bg-slate-900 dark:bg-slate-800 text-white px-8 py-3 rounded-xl font-bold hover:opacity-90 transition-all flex items-center gap-2">
                            <span class="material-symbols-outlined">dashboard</span> Back to Dashboard
                        </a>
                    </footer>
                </div>
            `;
        } else {
            container.innerHTML = `<div class="text-center py-20 text-red-500 font-bold">${response.message}</div>`;
        }
    }

    document.addEventListener('DOMContentLoaded', loadScoreCard);
</script>
</body></html>
