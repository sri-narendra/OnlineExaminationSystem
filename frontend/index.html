</div>
</div>
<div>

<label class="block text-sm font-semibold text-slate-700 dark:text-slate-300" for="password">Password</label>

<input class="w-full pl-12 pr-12 py-3.5 bg-background-light dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all placeholder:text-slate-400 dark:placeholder:text-slate-500 text-slate-900 dark:text-white" id="password" name="password" placeholder="••••••••" required="" type="password"/>

</div>

<script src="config.js"></script>
<script src="js/auth.js"></script>
<script>
    // Tab switching logic for roles
    const roleBtns = document.querySelectorAll('.role-btn');
    roleBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            roleBtns.forEach(b => {
                b.setAttribute('aria-selected', 'false');
                b.classList.remove('bg-white', 'dark:bg-slate-700', 'text-primary', 'shadow-sm');
                b.classList.add('text-slate-500', 'dark:text-slate-400');
            });
            btn.setAttribute('aria-selected', 'true');
            btn.classList.add('bg-white', 'dark:bg-slate-700', 'text-primary', 'shadow-sm');
            btn.classList.remove('text-slate-500', 'dark:text-slate-400');
        });
    });

    // Password toggle
    document.getElementById('toggle-password').addEventListener('click', function() {
        const passwordInput = document.getElementById('password');
        const icon = this.querySelector('span');
        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            icon.textContent = 'visibility_off';
        } else {
            passwordInput.type = 'password';
            icon.textContent = 'visibility';
        }
    });

    document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        const button = e.target.querySelector('button[type="submit"]');
        button.disabled = true;
        button.textContent = 'Logging in...';

        try {
            const response = await fetch(`${config.API_BASE_URL}/auth/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            const data = await response.json();

            button.disabled = false;
            button.innerHTML = 'Sign In <span class="material-symbols-outlined transition-transform group-hover:translate-x-1">login</span>';

            if (data.success) {
                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify(data.user));
                
                // Redirect based on role
                if (data.user.role === 'student') window.location.href = 'student.html';
                else if (data.user.role === 'teacher') window.location.href = 'teacher.html';
                else if (data.user.role === 'admin') window.location.href = 'admin.html';
            } else {
                showAlert(data.message, 'error');
            }
        } catch (error) {
            button.disabled = false;
            button.innerHTML = 'Sign In <span class="material-symbols-outlined transition-transform group-hover:translate-x-1">login</span>';
            showAlert('An error occurred during login. Please attempt again.', 'error');
        }
    });
</script>
